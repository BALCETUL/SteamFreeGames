name: Crawler runner

on:
  schedule:
    - cron: '0 * * * *'    # каждый час в 00 минут UTC
  workflow_dispatch:      # кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Полная история для корректной работы git

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run crawler with retry mechanism
        run: |
          # Пробуем запустить парсер с повторными попытками
          for i in {1..3}; do
            echo "Попытка $i из 3"
            if python NeedFree.py; then
              echo "Парсинг успешен на попытке $i"
              break
            else
              echo "Ошибка на попытке $i"
              if [ $i -eq 3 ]; then
                echo "Все попытки исчерпаны"
                exit 1
              fi
              sleep 30
            fi
          done
          
      - name: Validate results
        run: |
          # Проверяем что файл создался и содержит данные
          if [ ! -f "free_goods_detail.json" ]; then
            echo "Файл free_goods_detail.json не создан"
            exit 1
          fi
          
          # Проверяем что JSON валидный
          if ! python -m json.tool free_goods_detail.json > /dev/null; then
            echo "Файл free_goods_detail.json содержит невалидный JSON"
            exit 1
          fi
          
          # Выводим статистику
          echo "Результаты парсинга:"
          python -c "
          import json
          with open('free_goods_detail.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
              print(f'Найдено игр: {data[\"total_count\"]}')
              print(f'Время обновления: {data[\"update_time\"]}')
          "
          
      - name: Update free details json
        run: |
          # Настраиваем git
          git config --global user.name 'BALCETUL'
          git config --global user.email 'youremail@example.com'
          
          # Проверяем есть ли изменения
          if git diff --quiet free_goods_detail.json; then
            echo "Нет изменений в free_goods_detail.json"
          else
            echo "Обнаружены изменения в free_goods_detail.json"
            git add free_goods_detail.json
            git commit -m "Автоматическое обновление free_goods_detail.json"
            
            # Пробуем отправить изменения с повторными попытками
            for i in {1..3}; do
              if git push; then
                echo "Изменения отправлены успешно"
                break
              else
                echo "Ошибка отправки на попытке $i"
                if [ $i -eq 3 ]; then
                  echo "Не удалось отправить изменения"
                  exit 1
                fi
                git pull --rebase
                sleep 10
              fi
            done
          fi

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: steam-parser-logs
          path: steam_parser.log
          retention-days: 7
