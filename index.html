<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamFreeGames — Бесплатные игры и скидки</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
    .loading-spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .card {
      background: #1f2937;
      border: 1px solid rgba(59, 130, 246, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .discount-badge {
      background: linear-gradient(to right, #22c55e, #16a34a);
      box-shadow: 0 0 5px rgba(34,197,94,0.5);
    }
    .steam-btn {
      background: linear-gradient(to right, #3b82f6, #2563eb);
    }
    .steam-btn:hover {
      background: linear-gradient(to right, #2563eb, #1d4ed8);
    }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-7xl mx-auto">
    <!-- Заголовок и статистика -->
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-6xl font-bold mb-2 text-white">SteamFreeGames</h1>
      <p class="text-lg text-gray-300">Бесплатные игры и скидки в Steam</p>
      <p class="text-md mt-4 text-white">Всего найдено: <span id="total-count">0</span></p>
    </div>

    <!-- Фильтры и поиск -->
    <div class="bg-gray-800 p-4 rounded-lg mb-6">
      <div class="flex flex-wrap gap-4">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Поиск по названию..." 
          class="flex-1 px-4 py-2 bg-gray-700 rounded-lg text-white"
        >
        <select id="filter-type" class="px-4 py-2 bg-gray-700 rounded-lg text-white">
          <option value="all">Все типы</option>
          <option value="game">Только игры</option>
          <option value="dlc">Только DLC</option>
        </select>
        <select id="filter-discount" class="px-4 py-2 bg-gray-700 rounded-lg text-white">
          <option value="100">Скидка 100%</option>
          <option value="90">Скидка 90%+</option>
          <option value="75">Скидка 75%+</option>
          <option value="50">Скидка 50%+</option>
        </select>
      </div>
    </div>

    <!-- Пагинация -->
    <div class="flex justify-between items-center mb-4">
      <button id="prev-page" class="px-4 py-2 bg-blue-600 rounded-lg text-white disabled:opacity-50">Назад</button>
      <span id="page-info" class="text-white">Страница 1</span>
      <button id="next-page" class="px-4 py-2 bg-blue-600 rounded-lg text-white disabled:opacity-50">Вперёд</button>
    </div>

    <!-- Загрузка и ошибки -->
    <div id="loading" class="flex justify-center my-8"><div class="loading-spinner"></div></div>
    <div id="error" class="hidden text-center bg-red-600 p-4 rounded-lg mb-4">Ошибка загрузки данных!</div>
    <div id="no-games" class="hidden text-center text-gray-300 p-4">Нет подходящих игр.</div>

    <!-- Контейнер для игр -->
    <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Пагинация (дублируется внизу) -->
    <div class="flex justify-between items-center mt-6">
      <button id="prev-page-bottom" class="px-4 py-2 bg-blue-600 rounded-lg text-white disabled:opacity-50">Назад</button>
      <span id="page-info-bottom" class="text-white">Страница 1</span>
      <button id="next-page-bottom" class="px-4 py-2 bg-blue-600 rounded-lg text-white disabled:opacity-50">Вперёд</button>
    </div>
  </div>

  <script>
    let allGames = [];
    let currentPage = 1;
    const gamesPerPage = 50;

    // Загрузка данных
    async function fetchGames() {
      try {
        const resp = await fetch('https://raw.githubusercontent.com/BALCETUL/SteamFreeGames/main/free_goods_detail.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('Ошибка загрузки');
        const data = await resp.json();
        allGames = data.free_list || [];
        document.getElementById('total-count').textContent = allGames.length;
        renderGames();
      } catch (e) {
        console.error(e);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    // Фильтрация и рендеринг игр
    function renderGames() {
      const searchQuery = document.getElementById('search-input').value.toLowerCase();
      const filterType = document.getElementById('filter-type').value;
      const filterDiscount = parseInt(document.getElementById('filter-discount').value);

      // Фильтрация
      const filteredGames = allGames.filter(([name, link]) => {
        const isGame = link.includes('/app/');
        const isDLC = link.includes('/sub/');
        const matchesSearch = name.toLowerCase().includes(searchQuery);
        let matchesType = true;
        let matchesDiscount = true;

        if (filterType === 'game') matchesType = isGame;
        if (filterType === 'dlc') matchesType = isDLC;
        // Предполагаем, что все игры в списке имеют 100% скидку (можно доработать)
        if (filterDiscount < 100) matchesDiscount = false; // Заглушка

        return matchesSearch && matchesType && matchesDiscount;
      });

      // Пагинация
      const totalPages = Math.ceil(filteredGames.length / gamesPerPage);
      const startIdx = (currentPage - 1) * gamesPerPage;
      const paginatedGames = filteredGames.slice(startIdx, startIdx + gamesPerPage);

      // Отрисовка
      const container = document.getElementById('games-container');
      container.innerHTML = '';

      if (paginatedGames.length === 0) {
        document.getElementById('no-games').classList.remove('hidden');
      } else {
        document.getElementById('no-games').classList.add('hidden');
        paginatedGames.forEach(([name, link], idx) => {
          const id = link.includes('/sub/') ? link.match(/\/sub\/(\d+)/)[1] : link.match(/\/app\/(\d+)/)[1];
          const imgUrl = link.includes('/sub/') 
            ? `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg` 
            : `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`;

          const card = document.createElement('div');
          card.className = 'card rounded-lg overflow-hidden animate__animated animate__fadeIn';
          card.style.animationDelay = `${idx * 0.05}s`;
          card.innerHTML = `
            <div class="relative">
              <img src="${imgUrl}" alt="${name}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/460x215?text=Нет+изображения'">
              <span class="discount-badge absolute top-2 right-2 px-2 py-1 rounded-md text-sm font-bold">100%</span>
            </div>
            <div class="p-4">
              <h3 class="text-xl font-semibold text-white mb-2 truncate">${name}</h3>
              <a href="${link}" target="_blank" class="steam-btn inline-block px-4 py-2 rounded-md text-white font-medium">Получить</a>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // Обновление пагинации
      document.getElementById('page-info').textContent = `Страница ${currentPage} из ${totalPages}`;
      document.getElementById('page-info-bottom').textContent = `Страница ${currentPage} из ${totalPages}`;
      document.getElementById('prev-page').disabled = currentPage === 1;
      document.getElementById('next-page').disabled = currentPage === totalPages;
      document.getElementById('prev-page-bottom').disabled = currentPage === 1;
      document.getElementById('next-page-bottom').disabled = currentPage === totalPages;

      // Скрываем загрузку
      document.getElementById('loading').classList.add('hidden');
    }

    // Обработчики событий
    document.getElementById('search-input').addEventListener('input', () => {
      currentPage = 1;
      renderGames();
    });
    document.getElementById('filter-type').addEventListener('change', renderGames);
    document.getElementById('filter-discount').addEventListener('change', renderGames);
    document.getElementById('prev-page').addEventListener('click', () => { currentPage--; renderGames(); });
    document.getElementById('next-page').addEventListener('click', () => { currentPage++; renderGames(); });
    document.getElementById('prev-page-bottom').addEventListener('click', () => { currentPage--; renderGames(); });
    document.getElementById('next-page-bottom').addEventListener('click', () => { currentPage++; renderGames(); });

    // Запуск при загрузке
    document.addEventListener('DOMContentLoaded', fetchGames);
  </script>
</body>
</html>
