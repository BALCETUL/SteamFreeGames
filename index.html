<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamFreeGames - Бесплатные игры Steam</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-4">SteamFreeGames</h1>
        <p class="text-center text-gray-400 mb-6">Автоматический поиск бесплатных игр Steam со 100% скидкой</p>
        <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <span class="text-lg">Всего игр: </span>
                <span id="totalcount" class="text-lg font-semibold"></span>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700">
                        <th class="p-3">Название игры</th>
                        <th class="p-3">Ссылка</th>
                    </tr>
                </thead>
                <tbody id="listcontent"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="2" class="text-center p-3 text-gray-400">
                            Последнее обновление (UTC+8): <span id="uptime" class="text-red-400"></span>
                        </td>
                    </tr>
                </tfoot>
            </table>
            <div class="text-center mt-4">
                <a href="https://github.com/BALCETUL/SteamFreeGames" class="text-gray-400 hover:text-white flex justify-center items-center gap-2">
                    <span>Посмотреть на GitHub</span>
                    <svg version="1.1" width="16" height="16" viewBox="0 0 16 16" class="octicon octicon-mark-github" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </div>
    <script>
        function showlist() {
            $.ajax({
                type: "get",
                url: "./free_goods_detail.json",
                success: function(data) {
                    $('#totalcount').text(data["total_count"]);
                    $('#uptime').text(data["update_time"]);
                    for (var i = 0; i < data["free_list"].length; ++i) {
                        $('#listcontent').append(
                            "<tr class='hover:bg-gray-600'><td class='p-3'>" + data["free_list"][i][0] + "</td>" +
                            "<td class='p-3'><a href='" + data["free_list"][i][1] + "' class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded'>Магазин</a></td></tr>"
                        );
                    }
                }
            });
        }
        $(document).ready(showlist);
    </script>
</body>
</html>
