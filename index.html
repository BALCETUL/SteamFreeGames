<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamFreeGames — Бесплатные игры и скидки</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
    .loading-spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .card {
      background: #1f2937;
      border: 1px solid rgba(59, 130, 246, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      min-width: 250px;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .discount-100 { background: linear-gradient(to right, #22c55e, #16a34a); }
    .discount-90 { background: linear-gradient(to right, #3b82f6, #2563eb); }
    .discount-75 { background: linear-gradient(to right, #a855f7, #9333ea); }
    .discount-50 { background: linear-gradient(to right, #f59e0b, #d97706); }
    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      padding-bottom: 1rem;
    }
    .horizontal-scroll::-webkit-scrollbar {
      height: 6px;
    }
    .horizontal-scroll::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-7xl mx-auto">
    <!-- Заголовок -->
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-6xl font-bold mb-2 text-white">SteamFreeGames</h1>
      <p class="text-lg text-gray-300">Бесплатные игры и скидки в Steam</p>
    </div>

    <!-- Поиск -->
    <div class="bg-gray-800 p-4 rounded-lg mb-6">
      <input 
        type="text" 
        id="search-input" 
        placeholder="Поиск по названию..." 
        class="w-full px-4 py-2 bg-gray-700 rounded-lg text-white"
      >
    </div>

    <!-- Фильтр по скидке -->
    <div class="flex gap-4 mb-6">
      <select id="filter-discount" class="px-4 py-2 bg-gray-700 rounded-lg text-white">
        <option value="all">Все скидки</option>
        <option value="100">100% (бесплатно)</option>
        <option value="90">90%+</option>
        <option value="75">75%+</option>
        <option value="50">50%+</option>
      </select>
    </div>

    <!-- Блок с 100% скидками -->
    <h2 class="text-2xl font-bold text-white mb-4">Бесплатно сейчас (100% скидка)</h2>
    <div id="free-games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

    <!-- Блок с остальными скидками -->
    <h2 class="text-2xl font-bold text-white mb-4">Другие скидки</h2>
    <div id="discounted-games-container" class="horizontal-scroll"></div>

    <!-- Загрузка и ошибки -->
    <div id="loading" class="flex justify-center my-8"><div class="loading-spinner"></div></div>
    <div id="error" class="hidden text-center bg-red-600 p-4 rounded-lg mb-4">Ошибка загрузки данных!</div>
    <div id="no-games" class="hidden text-center text-gray-300 p-4">Нет подходящих игр.</div>
  </div>

  <script>
    let allGames = [];
    let freeGames = [];
    let discountedGames = [];

    // Загрузка данных
    async function fetchGames() {
      try {
        document.getElementById('loading').classList.remove('hidden');
        const resp = await fetch('https://raw.githubusercontent.com/BALCETUL/SteamFreeGames/main/free_goods_detail.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('Ошибка загрузки');
        const data = await resp.json();
        allGames = data.free_list || [];
        
        // Разделяем на бесплатные и остальные (заглушка — в реальном API нужно получать скидки)
        freeGames = allGames.filter((game, index) => index < 10); // Первые 10 как "бесплатные"
        discountedGames = allGames.filter((game, index) => index >= 10); // Остальные как "скидки"
        
        renderGames();
      } catch (e) {
        console.error(e);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    // Отрисовка игр
    function renderGames() {
      const searchQuery = document.getElementById('search-input').value.toLowerCase();
      const filterDiscount = document.getElementById('filter-discount').value;

      // Фильтрация
      const filteredFreeGames = freeGames.filter(([name]) => 
        name.toLowerCase().includes(searchQuery)
      );
      
      const filteredDiscountedGames = discountedGames.filter(([name]) => 
        name.toLowerCase().includes(searchQuery) &&
        (filterDiscount === 'all' || filterDiscount === '100') // Заглушка (в реальном API нужно проверять скидку)
      );

      // Отрисовка бесплатных игр (грид)
      const freeContainer = document.getElementById('free-games-container');
      freeContainer.innerHTML = '';
      
      if (filteredFreeGames.length === 0) {
        freeContainer.innerHTML = '<p class="text-gray-400">Нет бесплатных игр.</p>';
      } else {
        filteredFreeGames.forEach(([name, link], idx) => {
          const id = link.includes('/sub/') ? link.match(/\/sub\/(\d+)/)[1] : link.match(/\/app\/(\d+)/)[1];
          const imgUrl = link.includes('/sub/') 
            ? `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg` 
            : `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`;

          const card = document.createElement('div');
          card.className = 'card rounded-lg overflow-hidden animate__animated animate__fadeIn';
          card.style.animationDelay = `${idx * 0.05}s`;
          card.innerHTML = `
            <div class="relative">
              <img src="${imgUrl}" alt="${name}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/460x215?text=Нет+изображения'">
              <span class="discount-100 absolute top-2 right-2 px-2 py-1 rounded-md text-sm font-bold">100%</span>
            </div>
            <div class="p-4">
              <h3 class="text-xl font-semibold text-white mb-2 truncate">${name}</h3>
              <a href="${link}" target="_blank" class="inline-block px-4 py-2 bg-blue-600 rounded-md text-white font-medium">Получить</a>
            </div>
          `;
          freeContainer.appendChild(card);
        });
      }

      // Отрисовка остальных скидок (горизонтальный скролл)
      const discountedContainer = document.getElementById('discounted-games-container');
      discountedContainer.innerHTML = '';
      
      if (filteredDiscountedGames.length === 0) {
        discountedContainer.innerHTML = '<p class="text-gray-400">Нет игр со скидками.</p>';
      } else {
        filteredDiscountedGames.forEach(([name, link], idx) => {
          const id = link.includes('/sub/') ? link.match(/\/sub\/(\d+)/)[1] : link.match(/\/app\/(\d+)/)[1];
          const imgUrl = link.includes('/sub/') 
            ? `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg` 
            : `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`;

          // Рандомная скидка для примера (в реальном API нужно брать из данных)
          const randomDiscount = [90, 75, 50][Math.floor(Math.random() * 3)];
          
          const card = document.createElement('div');
          card.className = 'card rounded-lg overflow-hidden flex-shrink-0';
          card.innerHTML = `
            <div class="relative" style="width: 250px;">
              <img src="${imgUrl}" alt="${name}" class="w-full h-32 object-cover" onerror="this.src='https://via.placeholder.com/250x120?text=Нет+изображения'">
              <span class="discount-${randomDiscount} absolute top-2 right-2 px-2 py-1 rounded-md text-sm font-bold">${randomDiscount}%</span>
            </div>
            <div class="p-4">
              <h3 class="text-lg font-semibold text-white mb-2 truncate">${name}</h3>
              <a href="${link}" target="_blank" class="inline-block px-3 py-1 bg-blue-600 rounded-md text-white text-sm">В Steam</a>
            </div>
          `;
          discountedContainer.appendChild(card);
        });
      }

      document.getElementById('loading').classList.add('hidden');
    }

    // Обработчики событий
    document.getElementById('search-input').addEventListener('input', renderGames);
    document.getElementById('filter-discount').addEventListener('change', renderGames);

    // Запуск при загрузке
    document.addEventListener('DOMContentLoaded', fetchGames);
  </script>
</body>
</html>
