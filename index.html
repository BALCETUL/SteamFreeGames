<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SteamFreeGames — Бесплатные предложения Steam</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg,#1a202c,#2d3748);
      color: #e2e8f0;
      font-family: 'Inter',sans-serif;
    }
    .update-box { /* как у тебя */ }
    .tooltip { /* как у тебя */ }
    .loading-spinner { /* как у тебя */ }
    .error-message { /* как у тебя */ }
    .card { /* как у тебя */ }
    .img-container { /* как у тебя */ }
    .game-img { /* как у тебя */ }
    .discount-badge { /* как у тебя */ }
    .steam-btn { /* как у тебя */ }
  </style>
</head>
<body class="min-h-screen p-4 relative">

  <!-- Всплывающая подсказка и время -->
  <div class="update-box animate__fadeIn">
    <svg class="update-icon" ...></svg>
    Обновлено (UTC+3): <span id="update-time">-</span>
    <div class="tooltip">
      Этот сайт автоматически собирает игры и DLC<br>
      со 100% скидкой в Steam.<br>
      Данные обновляются каждый час.<br>
      Парсер обновляет JSON и GitHub Pages.
    </div>
  </div>

  <!-- Блок карточек 100% скидок -->
  <section class="w-full max-w-6xl mx-auto mb-12">
    <h2 class="text-3xl font-bold text-center mb-6">100% скидка</h2>
    <div id="cards-100" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <!-- Фильтры и таблица -->
  <section class="w-full max-w-6xl mx-auto">
    <div class="flex flex-wrap gap-4 mb-6">
      <input id="search" type="text" placeholder="Поиск по названию…" 
             class="flex-1 min-w-[200px] p-2 rounded bg-gray-700 placeholder-gray-400 text-white"/>
      <div class="flex items-center gap-2">
        <span>Цена от</span>
        <input id="minPrice" type="number" class="w-20 p-2 rounded bg-gray-700 text-white"/>
        <div id="priceSlider" class="flex-1"></div>
        <input id="maxPrice" type="number" class="w-20 p-2 rounded bg-gray-700 text-white"/>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full table-auto bg-gray-800 rounded">
        <thead>
          <tr class="bg-gray-700">
            <th class="p-3">Изображение</th>
            <th class="p-3">Название</th>
            <th class="p-3">Цена</th>
            <th class="p-3">Ссылка</th>
          </tr>
        </thead>
        <tbody id="filtered-list"></tbody>
      </table>
    </div>
  </section>

  <!-- Спиннер и сообщения -->
  <div id="loading" class="loading-spinner fixed inset-0 m-auto"></div>
  <div id="error" class="error-message hidden max-w-2xl mx-auto text-center"></div>
  <div id="no-results" class="text-center text-gray-400 hidden">Ничего не найдено...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.js"></script>
  <script>
    let all = [], filtered = [];
    const cards100 = document.getElementById('cards-100');
    const tableBody = document.getElementById('filtered-list');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const noResults = document.getElementById('no-results');
    const searchInput = document.getElementById('search');
    const minPriceInput = document.getElementById('minPrice');
    const maxPriceInput = document.getElementById('maxPrice');
    const updateTime = document.getElementById('update-time');

    function render100() {
      cards100.innerHTML = '';
      all.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card animate__fadeInUp';
        div.innerHTML = `
          <div class="img-container"><img src="${item.image}" alt="" class="game-img"/><span class="discount-badge">100% скидка</span></div>
          <div class="p-4"><h3 class="text-lg text-white">${item.name}</h3>
          <a href="${item.link}" target="_blank" class="steam-btn mt-2 inline-block">Получить</a></div>`;
        cards100.append(div);
      });
    }

    function renderFiltered() {
      tableBody.innerHTML = '';
      if (!filtered.length) { noResults.classList.remove('hidden'); return; }
      noResults.classList.add('hidden');
      filtered.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="p-2"><img src="${item.image}" class="w-24 h-auto rounded"/></td>
          <td class="p-2">${item.name}</td>
          <td class="p-2">${item.priceText}</td>
          <td class="p-2"><a href="${item.link}" target="_blank" class="steam-btn">Перейти</a></td>`;
        tableBody.append(tr);
      });
    }

    function applyFilters() {
      const term = searchInput.value.toLowerCase();
      const minP = parseFloat(minPriceInput.value)||0;
      const maxP = parseFloat(maxPriceInput.value)||Infinity;
      filtered = all.filter(i =>
        i.name.toLowerCase().includes(term) &&
        i.price >= minP && i.price <= maxP
      );
      renderFiltered();
    }

    document.addEventListener('DOMContentLoaded', async()=>{
      try {
        const resp = await fetch('free_goods_detail.json',{cache:'no-store'});
        if(!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        updateTime.textContent = data.update_time;
        all = data.free_list.map(([name,link])=>{
          const id = link.includes('/sub/')?link.match(/\/sub\/(\d+)/)[1]:link.match(/\/app\/(\d+)/)[1];
          const image = link.includes('/sub/')?
            `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg`:
            `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`;
          return { name, link, image, price:0, priceText:'FREE' };
        });
        render100();
        // Price slider (maxPrice 0 since free only, but set up structure)
        noUiSlider.create(document.getElementById('priceSlider'), {
          start:[0,0], connect:true, range:{min:0,max:0}, step:1
        });
        applyFilters();
        loading.remove();
      } catch(e){
        loading.remove();
        error.classList.remove('hidden');
        error.textContent = 'Ошибка загрузки данных: '+e.message;
      }
    });

    searchInput.addEventListener('input',applyFilters);
    minPriceInput.addEventListener('change',applyFilters);
    maxPriceInput.addEventListener('change',applyFilters);
  </script>
</body>
</html>
