<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бесплатные предложения в Steam</title>
  <!-- Favicon и иконка для мобильных устройств -->
  <link rel="icon" type="image/png" href="https://via.placeholder.com/32?text=Icon">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180?text=Icon">
  <!-- Подключение Tailwind CSS через CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Подключение Animate.css для анимаций -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      position: relative;
    }
    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: #1f2937;
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: .5rem;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error-message {
      background: #ef4444;
      color: #fff;
      padding: 1rem;
      border-radius: .5rem;
      margin-top: 1rem;
    }
    .game-img {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 460/215;
      object-fit: contain;
      display: block;
      box-sizing: border-box;
    }
    .img-container {
      border-radius: .5rem;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative;
    }
    .steam-btn {
      background: linear-gradient(to right, #3b82f6, #2563eb);
      padding: .5rem 1rem;
      border-radius: .25rem;
      transition: all 0.3s ease;
      display: inline-block;
      text-decoration: none;
    }
    .steam-btn:hover {
      background: linear-gradient(to right, #2563eb, #1d4ed8);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
    .update-box {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(31, 41, 55, 0.8);
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.2);
      font-size: 0.875rem;
      color: #e2e8f0;
    }
    .update-icon {
      width: 1rem;
      height: 1rem;
      fill: #e2e8f0;
    }
    .discount-badge {
      position: absolute;
      top: 0.2rem;
      right: 0.2rem;
      background: linear-gradient(to right, #22c55e, #16a34a);
      color: #fff;
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
      font-size: 0.65rem;
      font-weight: 600;
      box-shadow: 0 0 5px rgba(34, 197, 94, 0.5);
      opacity: 0.9;
      z-index: 10;
      animation: fadeIn 0.5s ease-out;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <!-- Время обновления в правом верхнем углу -->
  <div class="update-box animate__animated animate__fadeIn" style="animation-delay: 0.5s;">
    <svg class="update-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Обновлено (UTC+3): <span id="update-time">-</span>
  </div>

  <!-- Заголовок -->
  <header class="text-center mb-8 animate__animated animate__fadeIn">
    <h1 class="text-4xl md:text-5xl font-bold text-white">Бесплатные предложения в Steam</h1>
    <p class="text-lg text-gray-300 mt-2">Получайте актуальную информацию о бесплатных играх и дополнениях (DLC) со 100% скидкой!</p>
    <p class="text-md text-white mt-4">Бесплатно сейчас: <span id="total-count">0</span></p>
  </header>

  <!-- Контейнер для игр и DLC -->
  <div id="games-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl"></div>

  <!-- Спиннер загрузки -->
  <div id="loading" class="flex items-center justify-center my-8">
    <div class="loading-spinner"></div>
  </div>

  <!-- Сообщение об ошибке -->
  <div id="error" class="text-center hidden">
    <p class="error-message">Не удалось загрузить список. Попробуйте позже!</p>
  </div>

  <!-- Сообщение об отсутствии предложений -->
  <div id="no-games" class="text-center text-gray-300 hidden">
    <p class="text-xl">На данный момент нет бесплатных предложений.</p>
  </div>

  <!-- Скрипт для загрузки данных и рендеринга -->
  <script>
    async function fetchGames() {
      const gamesContainer = document.getElementById('games-container');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const noGames = document.getElementById('no-games');
      const totalCount = document.getElementById('total-count');
      const updateTime = document.getElementById('update-time');

      try {
        const url = 'https://raw.githubusercontent.com/BALCETUL/SteamFreeGames/main/free_goods_detail.json';
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

        const data = await response.json();
        loading.classList.add('hidden');

        const list = data.free_list || [];
        totalCount.textContent = data.total_count || 0;
        updateTime.textContent = data.update_time || '-';

        if (list.length === 0) {
          noGames.classList.remove('hidden');
          return;
        }

        gamesContainer.classList.remove('hidden');
        list.forEach(([name, link], idx) => {
          let id, imgUrl;
          if (link.includes('/sub/')) {
            id = link.match(/\/sub\/(\d+)/)[1];
            imgUrl = id ? `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg` : 'https://via.placeholder.com/460x215?text=Нет+Image';
          } else {
            id = link.match(/\/app\/(\d+)/)[1];
            imgUrl = id ? `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg` : 'https://via.placeholder.com/460x215?text=Нет+Image';
          }

          const card = document.createElement('div');
          card.className = 'card relative bg-gray-800 rounded-lg overflow-hidden animate__animated animate__fadeInUp';
          card.style.animationDelay = `${idx * 0.1}s`;
          card.innerHTML = `
            <div class="img-container">
              <img src="${imgUrl}" alt="${name}" class="game-img"
                   onerror="this.src='https://via.placeholder.com/460x215?text=Нет+Image'"/>
              <span class="discount-badge">100% скидка</span>
            </div>
            <div class="p-4">
              <h3 class="text-xl font-semibold text-white mb-2">${name}</h3>
              <a href="${link}" target="_blank" class="steam-btn text-center text-white">Получить в Steam</a>
            </div>`;
          gamesContainer.appendChild(card);
        });
      } catch (err) {
        console.error('Ошибка загрузки данных:', err.message);
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        error.querySelector('.error-message').textContent = `Ошибка: ${err.message}. Попробуйте позже.`;
      }
    }

    document.addEventListener('DOMContentLoaded', fetchGames);
  </script>
</body>
</html>
