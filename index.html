<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Ваши текущие мета-теги и стили -->
  <style>
    /* Добавьте эти стили к существующим */
    .promo-badge {
      position: absolute;
      top: 0.2rem;
      left: 0.2rem;
      padding: 0.2rem 0.5rem;
      border-radius: .25rem;
      font-weight: 600;
      font-size: 0.8rem;
      z-index: 10;
    }
    .badge-keep {
      background: linear-gradient(to right, #10b981, #059669);
    }
    .badge-trial {
      background: linear-gradient(to right, #f59e0b, #d97706);
    }
    .time-info {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 0.5rem;
    }
    .install-btn {
      background: linear-gradient(to right, #6366f1, #4f46e5);
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- Ваш текущий HTML -->

  <script>
    async function fetchGames() {
      try {
        const resp = await fetch('https://raw.githubusercontent.com/BALCETUL/SteamFreeGames/main/free_goods_detail.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('total-count').textContent = data.total_count || 0;
        document.getElementById('update-time').textContent = data.update_time || '-';

        const list = data.free_list || [];
        if (!list.length) {
          document.getElementById('no-games').classList.remove('hidden');
          return;
        }

        const container = document.getElementById('games-container');
        container.classList.remove('hidden');
        
        list.forEach((game, idx) => {
          const id = game.url.match(/(app|sub)\/(\d+)/)[2];
          const isApp = game.url.includes('/app/');
          const imgUrl = isApp 
            ? `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`
            : `https://steamcdn-a.akamaihd.net/steam/subs/${id}/header.jpg`;

          const card = document.createElement('div');
          card.className = 'card animate__animated animate__fadeInUp';
          card.style.animationDelay = `${idx * 0.1}s`;
          
          // Форматируем время
          const startTime = game.start ? new Date(game.start).toLocaleString() : 'Неизвестно';
          const endTime = game.end ? new Date(game.end).toLocaleString() : 'Неизвестно';
          
          card.innerHTML = `
            <div class="img-container">
              <img src="${imgUrl}"
                   alt="${game.name}"
                   class="game-img"
                   loading="lazy"
                   onerror="this.src='https://via.placeholder.com/460x215?text=Нет+Image'"/>
              <span class="discount-badge">100% скидка</span>
              <span class="promo-badge ${game.type === 'Free to Keep' ? 'badge-keep' : 'badge-trial'}">
                ${game.type}
              </span>
            </div>
            <div class="p-4">
              <h3 class="text-xl font-semibold text-white mb-2">${game.name}</h3>
              <div class="time-info">
                <div>Начало: ${startTime}</div>
                <div>Конец: ${endTime}</div>
              </div>
              <div class="mt-3 flex">
                <a href="${game.url}" target="_blank" class="steam-btn">В магазин</a>
                ${game.install ? 
                  `<a href="${game.install}" class="steam-btn install-btn">Установить</a>` : 
                  ''}
              </div>
            </div>`;
          container.appendChild(card);
        });
      } catch (e) {
        console.error(e);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }
    document.addEventListener('DOMContentLoaded', fetchGames);
  </script>
</body>
</html>
