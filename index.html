<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SteamFreeGames — Бесплатные игры Steam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
    }
    .table-dark {
      color: #e0e0e0;
    }
    a.btn-primary {
      background-color: #1f80e0;
      border-color: #1f80e0;
    }
    a.btn-primary:hover {
      background-color: #1562a2;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">SteamFreeGames</h1>
    <p>Список игр со скидкой 100% в Steam (обновляется каждый день)</p>
    <div class="mb-3">
      <span class="fw-bold">Всего игр:</span> <span id="totalcount">...</span>
    </div>
    <table class="table table-dark table-striped">
      <thead>
        <tr><th>Игра</th><th>Ссылка</th></tr>
      </thead>
      <tbody id="listcontent"></tbody>
      <tfoot>
        <tr>
          <td colspan="2" class="text-center">
            Обновлено (UTC+8): <span id="uptime" class="text-danger"></span>
          </td>
        </tr>
      </tfoot>
    </table>
    <footer class="mt-4">
      <a href="https://github.com/BALCETUL/SteamFreeGames" class="text-decoration-none">
        Посмотреть исходники на GitHub
      </a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('./free_goods_detail.json')
      .then(resp => resp.json())
      .then(data => {
        document.getElementById('totalcount').innerText = data.total_count;
        document.getElementById('uptime').innerText = data.update_time;
        const tbody = document.getElementById('listcontent');
        data.free_list.forEach(item => {
          const tr = document.createElement('tr');
          tr.classList.add('table-success');
          tr.innerHTML = `
            <td>${item[0]}</td>
            <td>
              <a href="${item[1]}" class="btn btn-primary" target="_blank">
                Перейти в магазин
              </a>
            </td>`;
          tbody.appendChild(tr);
        });
      });
  </script>
</body>
</html>
