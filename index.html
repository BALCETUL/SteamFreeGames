<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamFreeGames - Бесплатные игры Steam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .badge-discount { background: linear-gradient(to right, #22c55e, #16a34a); color: #fff; padding: .3rem .6rem; border-radius: .25rem; font-size: .8rem; font-weight: 700; }
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message { background: #ef4444; color: #fff; padding: 1rem; border-radius: .5rem; margin-top: 1rem; }
    .game-img { width: 100%; height: 150px; object-fit: cover; border-radius: .5rem; }
    .count-box { 
      background: linear-gradient(135deg, #3b82f6, #ec4899); 
      padding: .75rem 1.5rem; 
      border-radius: 3rem; 
      display: inline-flex; 
      align-items: center; 
      gap: .75rem; 
      box-shadow: 0 6px 12px rgba(0,0,0,0.3); 
      animation: pulse 2s infinite; 
      border: 2px solid rgba(255,255,255,0.2);
    }
    .count-icon { width: 1.8rem; height: 1.8rem; fill: #fff; }
    .footer { background: linear-gradient(to right, #1f2937, #111827); padding: 1rem; border-radius: .5rem; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="text-center mb-8">
    <h1 class="text-4xl md:text-6xl font-bold text-white mb-2 fade-in">SteamFreeGames</h1>
    <p class="text-lg text-gray-300 fade-in" style="animation-delay: 0.2s;">
      Сегодняшние бесплатные игры и DLC в Steam со 100% скидкой!
    </p>
    <p class="text-md text-white count-box mt-4 fade-in" style="animation-delay: 0.4s;">
      <svg class="count-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Бесплатно сейчас: <span id="total-count">0</span>
    </p>
  </div>

  <div id="loading" class="flex items-center justify-center">
    <div class="spinner"></div>
  </div>

  <div id="error" class="text-center hidden">
    <p class="error-message">Не удалось загрузить игры. Попробуйте позже или проверьте завтра!</p>
  </div>

  <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl w-full hidden">
    <!-- Карточки игр будут здесь -->
  </div>

  <div id="no-games" class="text-center text-gray-300 hidden">
    <p class="text-xl">Сегодня нет бесплатных игр или DLC. Проверьте завтра!</p>
  </div>

  <footer class="mt-8 text-center text-gray-400 footer">
    <p>Создано <a href="https://github.com/BALCETUL/SteamFreeGames" class="text-blue-400 hover:text-blue-300 flex justify-center items-center gap-2 inline-flex">
      BALCETUL
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a></p>
  </footer>

  <script>
    async function fetchGames() {
      try {
        const url = 'https://raw.githubusercontent.com/BALCETUL/SteamFreeGames/main/free_goods_detail.json';
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const data = await resp.json();
        document.getElementById('loading').classList.add('hidden');

        const list = data.free_list || [];
        document.getElementById('total-count').textContent = data.total_count || 0;

        if (list.length === 0) {
          return document.getElementById('no-games').classList.remove('hidden');
        }

        const container = document.getElementById('games-container');
        container.classList.remove('hidden');

        list.forEach(([name, link], idx) => {
          const appId = link.match(/\/app\/(\d+)/)?.[1];
          const imgUrl = appId ? `https://steamcdn-a.akamaihd.net/steam/apps/${appId}/header.jpg` : 'https://via.placeholder.com/460x215?text=Нет+изображения';
          const card = document.createElement('div');
          card.className = 'card bg-gray-800 p-6 rounded-lg shadow-lg transform transition duration-300 fade-in';
          card.style.animationDelay = `${idx * 0.1}s`;
          card.innerHTML = `
            <img src="${imgUrl}" alt="${name}" class="game-img mb-4" onerror="this.src='https://via.placeholder.com/460x215?text=Нет+изображения'">
            <div class="flex justify-between items-center mb-2">
              <h2 class="text-xl font-semibold text-white">${name}</h2>
              <span class="badge-discount">100% скидка</span>
            </div>
            <p class="text-green-400 font-bold mb-4">Бесплатно</p>
            <a href="${link}" target="_blank"
               class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
               Получить в Steam
            </a>`;
          container.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    window.onload = fetchGames;
  </script>
</body>
</html>
